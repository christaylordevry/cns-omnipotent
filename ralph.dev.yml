event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 120
  max_runtime_seconds: 14400
  starting_event: "work.start"

cli:
  backend: "claude"

backpressure:
  gates:
    - name: "verify"
      command: "bash scripts/verify.sh"
      on_fail: "Verification failed. Fix issues until scripts/verify.sh passes."

RObot:
  enabled: false
