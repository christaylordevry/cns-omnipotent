# CNS team overrides — adversarial code review workflow

[workflow]

activation_steps_prepend = [
  "When the diff touches vault_log_action, mutators, or audit logging, load _bmad-output/implementation-artifacts/5-2-mutations-and-vault-log-action.md as bound spec.",
]

persistent_facts = [
  "file:{project-root}/specs/cns-vault-contract/modules/security.md",
  "file:{project-root}/_bmad-output/implementation-artifacts/5-2-mutations-and-vault-log-action.md",
  "Review against specs/cns-vault-contract/ — spec is normative over implementation convenience.",
  "Flag WriteGate violations, vault boundary breaches, and missing Context7 evidence for new library usage.",
  "Verify gate: recommend running bash scripts/verify.sh before closing the review.",
]
