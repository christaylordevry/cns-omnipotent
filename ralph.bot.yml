event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 500
  max_runtime_seconds: 999999999
  starting_event: "work.start"

cli:
  backend: "claude"

backpressure:
  gates:
    - name: "verify"
      command: "bash scripts/verify.sh"
      on_fail: "Verification failed. Fix until scripts/verify.sh passes."

RObot:
  enabled: true
  timeout_seconds: 3600
  telegram:
    bot_token: "${RALPH_TELEGRAM_BOT_TOKEN}"
